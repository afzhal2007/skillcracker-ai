<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SkillCracker AI | Feedback</title>
  <link rel="icon" type="image/svg+xml" href="../assets/images/logo.svg" />
  <link rel="stylesheet" href="../css/results.css" />
</head>

<body>
  <div class="result-page">

    <header class="result-topbar">
      <a href="../dashboard.html" class="brand">
        <div class="brand-icon">⚡</div>
        <div>
          <h2>SkillCracker <span>AI</span></h2>
          <p>User Feedback</p>
        </div>
      </a>

      <div class="top-actions">
        <a href="motivation.html" class="nav-btn ghost">Back</a>
        <a href="../dashboard.html" class="nav-btn primary">Dashboard</a>
      </div>
    </header>

    <main class="result-shell">

      <section class="hero-result">
        <span class="tag">FEEDBACK</span>
        <h1>Share your feedback</h1>
        <p>Your feedback helps improve SkillCracker AI for all freshers.</p>
      </section>

      <section class="feedback-card">
        <form id="feedbackForm">
          <div class="rating-box">
            <button type="button" class="rate-btn" data-rate="1">😐</button>
            <button type="button" class="rate-btn" data-rate="2">🙂</button>
            <button type="button" class="rate-btn" data-rate="3">😊</button>
            <button type="button" class="rate-btn" data-rate="4">🔥</button>
            <button type="button" class="rate-btn" data-rate="5">🏆</button>
          </div>

          <input type="hidden" id="rating" value="0" />

          <div class="field">
            <label>Your Name</label>
            <input type="text" id="feedbackName" value="" />
          </div>

          <div class="field">
            <label>Feedback Message</label>
            <textarea id="feedbackMessage" placeholder="Tell us what you liked and what to improve..."></textarea>
          </div>

          <button class="primary-btn full" type="submit">Submit Feedback</button>
        </form>
      </section>

    </main>
  </div>

  <div class="toast" id="toast">Feedback submitted successfully ✅</div>

  <script src="../js/storage.js"></script>
  <script type="module" src="../js/auth-check.js"></script>
  <script src="../js/results.js"></script>
</body>
</html>
