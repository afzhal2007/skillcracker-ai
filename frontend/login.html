<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SkillCracker AI | Login</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/logo.svg" />
  <link rel="stylesheet" href="css/auth.css" />
</head>

<body>
  <main class="auth-page">
    <section class="auth-card">

      <a href="index.html" class="brand">
        <div class="brand-icon">⚡</div>
        <div>
          <h2>SkillCracker <span>AI</span></h2>
          <p>Welcome back to interview practice</p>
        </div>
      </a>

      <div class="auth-heading">
        <span class="tag">LOGIN</span>
        <h1>Welcome Back</h1>
        <p>Login to continue your SkillCracker AI dashboard.</p>
      </div>

      <form id="loginForm" class="auth-form">
        <div class="field">
          <label>Email Address</label>
          <input type="email" id="loginEmail" placeholder="example@gmail.com" required />
        </div>

        <div class="field">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password" required />
        </div>

        <button type="submit" class="primary-btn">Login</button>
      </form>

      <div class="divider">
        <span></span>
        <p>or</p>
        <span></span>
      </div>

      <button class="google-btn" id="googleLoginBtn" type="button">
        <span>G</span>
        Login with Google
      </button>

      <p class="switch-text">
        New user?
        <a href="signup.html">Create account</a>
      </p>

      <p class="message" id="authMessage"></p>

    </section>
  </main>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
