<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SkillCracker AI | Signup</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/logo.svg" />
  <link rel="stylesheet" href="css/auth.css" />
</head>

<body>
  <main class="auth-page">
    <section class="auth-card">

      <a href="index.html" class="brand">
        <div class="brand-icon">⚡</div>
        <div>
          <h2>SkillCracker <span>AI</span></h2>
          <p>Create your interview account</p>
        </div>
      </a>

      <div class="auth-heading">
        <span class="tag">NEW USER</span>
        <h1>Create Account</h1>
        <p>Signup and start your AI interview practice.</p>
      </div>

      <form id="signupForm" class="auth-form">
        <div class="field">
          <label>Full Name</label>
          <input type="text" id="signupName" placeholder="Enter your full name" required />
        </div>

        <div class="field">
          <label>Email Address</label>
          <input type="email" id="signupEmail" placeholder="example@gmail.com" required />
        </div>

        <div class="field">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="Minimum 6 characters" required />
        </div>

        <button type="submit" class="primary-btn">Create Account</button>
      </form>

      <div class="divider">
        <span></span>
        <p>or</p>
        <span></span>
      </div>

      <button class="google-btn" id="googleSignupBtn" type="button">
        <span>G</span>
        Signup with Google
      </button>

      <p class="switch-text">
        Already have an account?
        <a href="login.html">Login</a>
      </p>

      <p class="message" id="authMessage"></p>

    </section>
  </main>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
